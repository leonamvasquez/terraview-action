name: 'TerraView Security Scan'
description: 'Scan Terraform plans for security issues and misconfigurations using TerraView'
author: 'Leonam Vasquez'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  plan:
    description: 'Path to the Terraform plan JSON file (terraform show -json plan.tfplan > plan.json)'
    required: true
  scanner:
    description: 'Static scanner: checkov, tfsec, terrascan'
    required: false
    default: 'checkov'
  provider:
    description: 'AI provider for contextual analysis: gemini, claude, openai, deepseek, openrouter, ollama'
    required: false
    default: ''
  model:
    description: 'AI model (provider-specific, e.g. gemini-2.0-flash, claude-haiku-4-5)'
    required: false
    default: ''
  api-key:
    description: 'AI provider API key (use a GitHub secret)'
    required: false
    default: ''
  format:
    description: 'Output format: pretty, json, sarif, html, markdown'
    required: false
    default: 'pretty'
  fail-on:
    description: 'Minimum severity to fail the job: HIGH (default), CRITICAL, NONE'
    required: false
    default: 'HIGH'
  version:
    description: 'TerraView version (e.g. v0.5.0). Defaults to latest release.'
    required: false
    default: 'latest'
  args:
    description: 'Additional arguments passed verbatim to terraview scan'
    required: false
    default: ''

outputs:
  exit-code:
    description: 'TerraView exit code: 0=safe, 1=HIGH findings present, 2=CRITICAL findings present'
    value: ${{ steps.scan.outputs.exit_code }}

runs:
  using: 'composite'
  steps:
    - name: Install TerraView
      shell: bash
      run: ${{ github.action_path }}/scripts/install.sh
      env:
        TV_VERSION: ${{ inputs.version }}

    - name: Run TerraView scan
      id: scan
      shell: bash
      run: ${{ github.action_path }}/scripts/run.sh
      env:
        TV_PLAN: ${{ inputs.plan }}
        TV_SCANNER: ${{ inputs.scanner }}
        TV_PROVIDER: ${{ inputs.provider }}
        TV_MODEL: ${{ inputs.model }}
        TV_API_KEY: ${{ inputs.api-key }}
        TV_FORMAT: ${{ inputs.format }}
        TV_FAIL_ON: ${{ inputs.fail-on }}
        TV_ARGS: ${{ inputs.args }}
